services:
  mediamtx:
    image: bluenviron/mediamtx:latest-ffmpeg
    container_name: mediamtx
    network_mode: host
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./mediamtx.yml:/mediamtx.yml.template:ro
    entrypoint: ["/bin/sh", "-c", "sed \"s|\\$${STREAM_KEY}|$$STREAM_KEY|g\" /mediamtx.yml.template > /mediamtx.yml && /mediamtx"]
